<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>MR Ön Analiz (Medikal Rapor)</title>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
canvas {
    margin: 10px;
    border: 2px solid #38bdf8;
}
#report {
    background: #020617;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
    text-align: left;
    max-width: 800px;
    margin-inline: auto;
    line-height: 1.6;
    border: 1px solid #334155;
}
h3 {
    border-bottom: 1px solid #334155;
    padding-bottom: 5px;
}
</style>
</head>

<body>

<h2>🧠 MR Görüntü Ön Değerlendirme Sistemi</h2>

<input type="file" id="fileInput">

<br><br>

<canvas id="original"></canvas>
<canvas id="processed"></canvas>

<div id="report">Sistem hazır...</div>

<script>
let cvReady = false;

function waitForCV() {
    if (typeof cv !== "undefined" && cv.Mat) {
        cvReady = true;
    } else {
        setTimeout(waitForCV, 100);
    }
}
waitForCV();

document.getElementById("fileInput").addEventListener("change", (e) => {
    if (!cvReady) {
        alert("Sistem yükleniyor, lütfen bekleyin.");
        return;
    }

    const file = e.target.files[0];
    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = () => processImage(img);
});

function processImage(img) {

    let canvas = document.getElementById("original");
    let ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    let src = cv.imread(canvas);
    let gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    let blur = new cv.Mat();
    cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);

    let thresh = new cv.Mat();
    cv.threshold(blur, thresh, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);

    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();
    cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let suspiciousCount = 0;
    let totalArea = 0;
    let maxArea = 0;

    for (let i = 0; i < contours.size(); i++) {
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);

        if (area > 500) {
            suspiciousCount++;
            totalArea += area;
            if (area > maxArea) maxArea = area;

            let rect = cv.boundingRect(cnt);

            cv.rectangle(
                src,
                new cv.Point(rect.x, rect.y),
                new cv.Point(rect.x + rect.width, rect.y + rect.height),
                [255, 0, 0, 255],
                2
            );
        }
    }

    cv.imshow("processed", src);

    generateMedicalReport(suspiciousCount, totalArea, maxArea);

    src.delete(); gray.delete(); blur.delete();
    thresh.delete(); contours.delete(); hierarchy.delete();
}


// 🧠 Doktor tarzı rapor
function generateMedicalReport(count, totalArea, maxArea) {

    let report = `
    <h3>📄 RADYOLOJİ ÖN DEĞERLENDİRME RAPORU</h3>

    <b>İnceleme:</b> Manyetik Rezonans Görüntüleme (MR)<br>
    <b>Analiz Tipi:</b> Otomatik Görüntü İşleme (AI destekli ön analiz)<br><br>

    <h3>🔍 Bulgular</h3>
    `;

    if (count === 0) {
        report += `
        Görüntüde belirgin patolojik yoğunluk artışı veya anormal yapı izlenmemiştir.
        `;
    } else {
        let avg = totalArea / count;

        report += `
        Görüntüde ${count} adet şüpheli yoğunluk bölgesi tespit edilmiştir.<br>
        Ortalama lezyon alanı: ${avg.toFixed(2)} px<br>
        En büyük lezyon alanı: ${maxArea.toFixed(2)} px<br><br>

        Tespit edilen bölgeler morfolojik olarak heterojen yapı gösterebilir.
        `;
    }

    report += `<h3>🧠 Yorum</h3>`;

    if (count === 0) {
        report += `
        Mevcut analizde anlamlı bir anormallik saptanmamıştır. Klinik bulgular ile korelasyon önerilir.
        `;
    } else {
        let risk = "orta";
        if (maxArea > 2000) risk = "yüksek";

        report += `
        Bulgular ${risk} risk kategorisinde değerlendirilebilir. 
        Daha ileri görüntüleme ve uzman değerlendirmesi önerilir.
        `;
    }

    report += `
    <h3>⚠️ Sonuç ve Öneri</h3>
    Bu sistem yalnızca otomatik ön analiz amaçlıdır ve kesin tanı yerine geçmez.<br>
    Klinik değerlendirme için radyoloji uzmanına başvurulmalıdır.
    `;

    document.getElementById("report").innerHTML = report;
}
</script>

</body>
</html>
