<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AI Medikal Görüntü Analiz Sistemi</title>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: #e2e8f0;
    text-align: center;
}

img {
    max-width: 90%;
    border: 2px solid #38bdf8;
    margin-top: 20px;
}

#report {
    max-width: 800px;
    margin: 20px auto;
    text-align: left;
    background: #020617;
    padding: 20px;
    border: 1px solid #334155;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>🧠 AI Destekli Medikal Görüntü Analiz Sistemi</h2>

<button onclick="startAnalysis()">Analizi Başlat</button>

<br>

<img id="image" src="mrorig.jpg">

<div id="status">Hazır</div>

<div id="report"></div>

<script>

function startAnalysis() {

    const status = document.getElementById("status");
    const img = document.getElementById("image");

    // Step 1
    status.innerHTML = "📡 Görüntü yükleniyor...";
    
    setTimeout(() => {
        status.innerHTML = "🧠 Yapay zeka modeli başlatılıyor...";
    }, 1000);

    // Step 2
    setTimeout(() => {
        status.innerHTML = "🔬 Doku analizi yapılıyor (Slice 12/32)...";
    }, 2000);

    // Step 3
    setTimeout(() => {
        status.innerHTML = "📊 Anormallik tespiti...";
    }, 3500);

    // Step 4 → SONUÇ
    setTimeout(() => {
        status.innerHTML = "✅ Analiz tamamlandı";
        img.src = "mrscript.jpg"; // 🔥 burada switch oluyor

        loadReport();
    }, 5000);
}

function loadReport() {
    fetch("report.json")
        .then(res => res.json())
        .then(data => {

            let html = `
            <h3>📄 RADYOLOJİ RAPORU</h3>

            <b>Hasta:</b> ${data.patient}<br>
            <b>İnceleme:</b> ${data.scan_type}<br><br>

            <h3>🔍 Bulgular</h3>
            `;

            data.findings.forEach(f => {
                html += `- ${f.desc} (Risk: ${f.risk})<br>`;
            });

            html += `
            <h3>🧠 Sonuç</h3>
            ${data.conclusion}
            `;

            document.getElementById("report").innerHTML = html;
        });
}

</script>

</body>
</html>
