<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>MR Analiz (Stable)</title>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
canvas {
    margin: 10px;
    border: 2px solid #38bdf8;
}
#report {
    background: #1e293b;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>🧠 MR Ön Analiz (Stable)</h2>

<input type="file" id="fileInput">

<br><br>

<canvas id="original"></canvas>
<canvas id="processed"></canvas>

<div id="report">Hazır...</div>

<script>
let cvReady = false;

// 🔥 OpenCV load fix
function waitForCV() {
    if (typeof cv !== "undefined" && cv.Mat) {
        cvReady = true;
        console.log("✅ OpenCV hazır");
    } else {
        setTimeout(waitForCV, 100);
    }
}
waitForCV();

// File input
document.getElementById("fileInput").addEventListener("change", (e) => {
    if (!cvReady) {
        alert("OpenCV henüz yüklenmedi, 1-2 saniye bekle.");
        return;
    }

    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = () => processImage(img);
});

function processImage(img) {

    let canvas = document.getElementById("original");
    let ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    let src = cv.imread(canvas);
    let gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    let blur = new cv.Mat();
    cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);

    let thresh = new cv.Mat();
    cv.threshold(blur, thresh, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);

    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();

    cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let suspiciousCount = 0;
    let totalArea = 0;

    for (let i = 0; i < contours.size(); i++) {
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);

        if (area > 500) {
            suspiciousCount++;
            totalArea += area;

            let rect = cv.boundingRect(cnt);

            cv.rectangle(
                src,
                new cv.Point(rect.x, rect.y),
                new cv.Point(rect.x + rect.width, rect.y + rect.height),
                [255, 0, 0, 255],
                2
            );
        }
    }

    cv.imshow("processed", src);

    // Report
    let report = "";

    if (suspiciousCount === 0) {
        report = "✅ Anormal bulgu yok | Risk: DÜŞÜK";
    } else {
        let avg = totalArea / suspiciousCount;
        let risk = avg > 1500 ? "YÜKSEK" : "ORTA";

        report = `
        ⚠️ ${suspiciousCount} şüpheli bölge<br>
        Ortalama alan: ${avg.toFixed(2)}<br>
        Risk: ${risk}<br>
        <small>Demo sistemidir</small>
        `;
    }

    document.getElementById("report").innerHTML = report;

    // cleanup
    src.delete(); gray.delete(); blur.delete();
    thresh.delete(); contours.delete(); hierarchy.delete();
}
</script>

</body>
</html>
